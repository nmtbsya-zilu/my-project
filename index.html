<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小月</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0a0e17;
    color: #cbd5e1;
    min-height: 100vh;
    overflow-x: hidden;
  }

  canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .page {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    padding: 32px 20px 48px;
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 24px 0 28px;
  }
  .avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
    border: 2px solid rgba(6, 182, 212, 0.4);
  }
  .hero h1 {
    font-size: 26px; font-weight: 700;
    color: #f1f5f9;
    margin-top: 14px;
  }
  .hero .sub {
    font-size: 14px; color: #06b6d4;
    margin-top: 4px;
  }

  /* Card */
  .card {
    background: rgba(17, 24, 39, 0.85);
    border: 1px solid #1e293b;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    backdrop-filter: blur(10px);
  }
  .card h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #06b6d4;
    margin-bottom: 14px;
  }

  /* Info rows */
  .row {
    display: flex; align-items: center;
    gap: 12px; padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .row:last-child { border-bottom: none; }
  .row .icon {
    font-size: 18px; width: 32px; text-align: center;
    flex-shrink: 0;
  }
  .row .label { font-size: 12px; color: #64748b; }
  .row .value { font-size: 14px; color: #cbd5e1; }

  /* Tags */
  .tags {
    display: flex; flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid #1e293b;
    color: #94a3b8;
  }

  /* Certs */
  .cert-row {
    display: flex; gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
    scroll-snap-type: x mandatory;
  }
  .cert-row img {
    width: 140px; height: auto;
    border-radius: 8px;
    cursor: pointer;
    scroll-snap-align: start;
    border: 1px solid #1e293b;
    transition: transform 0.2s;
  }
  .cert-row img:active { transform: scale(1.02); }

  /* Contact buttons */
  .btns {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 12px;
    border-radius: 10px; border: 1px solid #1e293b;
    text-decoration: none; color: #cbd5e1;
    font-size: 13px;
    transition: all 0.2s;
    background: rgba(255,255,255,0.02);
  }
  .btn:active { border-color: #06b6d4; background: rgba(6,182,212,0.08); }

  /* Lightbox */
  .lb {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
  }
  .lb.show { display: flex; }
  .lb img { max-width: 92vw; max-height: 85vh; border-radius: 8px; }
  .lb .close {
    position: absolute; top: 16px; right: 20px;
    font-size: 32px; color: #fff; cursor: pointer;
  }

  .footer {
    text-align: center; padding: 20px 0;
    font-size: 12px; color: #475569;
  }
</style>
</head>
<body>

<canvas id="snow"></canvas>

<div class="page">

  <div class="card">

    </div>
    <div class="row">
      <span class="icon">&#127968;</span>
      <div><div class="label">籍贯</div><div class="value">广西南宁</div></div>

  <div class="card">

  <div class="card">

      <span class="icon">&#127942;</span>

      <span class="icon">&#127942;</span>

  <div class="footer">&#169; 2026 小月</div>

</div>

<div class="lb" id="lb" onclick="closeLb()">
  <span class="close">&times;</span>
  <img id="lb-img" src="">
</div>

<script>
// Snow
const c = document.getElementById('snow');
const ctx = c.getContext('2d');
let w, h, flakes = [];

function resize() {
  w = c.width = window.innerWidth;
  h = c.height = window.innerHeight;
  flakes = Array.from({length: 50}, () => ({
    x: Math.random() * w, y: Math.random() * h,
    r: Math.random() * 2 + 0.5,
    vy: Math.random() * 0.4 + 0.15,
    vx: (Math.random() - 0.5) * 0.2,
    o: Math.random() * 0.4 + 0.15,
    wb: Math.random() * Math.PI * 2
  }));
}
resize();
window.addEventListener('resize', resize);

function draw() {
  ctx.clearRect(0, 0, w, h);
  flakes.forEach(f => {
    f.wb += 0.004;
    f.x += f.vx + Math.sin(f.wb) * 0.15;
    f.y += f.vy;
    if (f.y > h + 5) { f.y = -5; f.x = Math.random() * w; }
    if (f.x < -5) f.x = w + 5;
    if (f.x > w + 5) f.x = -5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(6,182,212,${f.o})`;
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

// Lightbox
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
function openLb(src) { lbImg.src = src; lb.classList.add('show'); }
function closeLb() { lb.classList.remove('show'); }
</script>

</body>
</html>
