<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成带名字的二维码</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0e17; gap: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  }
  canvas { border-radius: 16px; box-shadow: 0 0 40px rgba(6,182,212,0.2); }
  .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 12px 28px; border-radius: 8px; border: 1px solid #06b6d4;
    background: rgba(6,182,212,0.1); color: #06b6d4; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  button:hover { background: rgba(6,182,212,0.25); }
  .tab { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid #1e293b; }
  .tab button {
    border: none; border-radius: 0; padding: 10px 22px;
    background: transparent; color: #64748b; font-size: 13px;
  }
  .tab button.on { background: rgba(6,182,212,0.15); color: #06b6d4; }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="tab">
    <button class="on" onclick="switchType('desktop')" id="btn-desktop">电脑版</button>
    <button onclick="switchType('mobile')" id="btn-mobile">手机版</button>
  </div>
  <div class="btns">
    <button onclick="download()">下载图片</button>
  </div>

<script>
const desktopUrl = 'https://nmtbsya-zilu.github.io/my-project/index-full.html';
const mobileUrl = 'https://nmtbsya-zilu.github.io/my-project/';
let currentType = 'desktop';

function switchType(type) {
  currentType = type;
  document.getElementById('btn-desktop').classList.toggle('on', type === 'desktop');
  document.getElementById('btn-mobile').classList.toggle('on', type === 'mobile');
  drawQR(type === 'desktop' ? desktopUrl : mobileUrl);
}

function drawQR(url) {
  const canvas = document.getElementById('canvas');
  canvas.width = 500;
  canvas.height = 580;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.roundRect(0, 0, 500, 580, 20); ctx.fill();

  // Generate QR
  const qr = document.createElement('img');
  qr.crossOrigin = 'anonymous';
  qr.onload = () => {
    // QR code area
    ctx.drawImage(qr, 50, 50, 400, 400);

    // Name text
    ctx.fillStyle = '#0a0e17';
    ctx.font = 'bold 36px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('小月', 250, 500);

    // Subtitle
    ctx.fillStyle = '#64748b';
    ctx.font = '16px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText('扫码查看个人主页', 250, 535);
  };
  qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(url)}`;
}

function download() {
  const canvas = document.getElementById('canvas');
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = currentType === 'desktop' ? '小月-电脑版二维码.png' : '小月-手机版二维码.png';
  a.click();
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+r,y,r); this.closePath();
  };
}

drawQR(desktopUrl);
</script>
</body>
</html>
