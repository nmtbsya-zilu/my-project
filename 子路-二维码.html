<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>子路 - 二维码</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0e17;gap:16px;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
canvas{border-radius:16px;box-shadow:0 0 40px rgba(6,182,212,.2)}
button{padding:12px 28px;border-radius:8px;border:1px solid #06b6d4;background:rgba(6,182,212,.1);color:#06b6d4;font-size:14px;cursor:pointer}
button:hover{background:rgba(6,182,212,.25)}
</style></head><body>
<canvas id="c"></canvas>
<button onclick="download()">保存图片</button>
<script>
const qr=new Image();qr.crossOrigin='anonymous';
qr.onload=()=>{
 const cv=document.getElementById('c');cv.width=500;cv.height=580;
 const ctx=cv.getContext('2d');
 ctx.fillStyle='#fff';ctx.beginPath();ctx.roundRect(0,0,500,580,20);ctx.fill();
 ctx.drawImage(qr,50,50,400,400);
 ctx.fillStyle='#0a0e17';ctx.font='bold 36px "PingFang SC","Microsoft YaHei",sans-serif';ctx.textAlign='center';
 ctx.fillText('子路',250,500);
 ctx.fillStyle='#64748b';ctx.font='16px "PingFang SC","Microsoft YaHei",sans-serif';
 ctx.fillText('扫码查看个人主页',250,535);
};
qr.src='https://api.qrserver.com/v1/create-qr-code/?size=400x400&data='+encodeURIComponent('https://nmtbsya-zilu.github.io/my-project/');
CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+r,y,r);this.closePath()};
function download(){const a=document.createElement('a');a.href=document.getElementById('c').toDataURL('image/png');a.download='子路-二维码.png';a.click()}
</script></body></html>
